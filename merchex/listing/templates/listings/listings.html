{% extends 'listings/base.html' %}

{% block content %}

    <h1>Listings</h1>
    <p>Here are our listings:</p>
    <ul>
        {% for listing in listings %}
            <li><a href="{% url 'listing_detail' listing.id %}">{{ listing.title }}</a></li>
        {% endfor %}
    </ul>
        
{% endblock %}
